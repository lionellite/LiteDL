{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloaded Videos</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.16/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto py-8">
        <h1 class="text-3xl font-bold mb-4">Downloaded Videos</h1>
        <div class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">
            {% if downloads %}
            <table class="w-full">
                <thead>
                    <tr class="bg-gray-200">
                        <th class="px-4 py-2">Video Title</th>
                        <th class="px-4 py-2">Download Date</th>
                        <th class="px-4 py-2">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for download in downloads %}
                    <tr class="border-b">
                        <td class="px-4 py-2">{{ download.video_title }}</td>
                        <td class="px-4 py-2">{{ download.download_date }}</td>
                        <td class="px-4 py-2">
                            <a href="{{ download.downloaded_file.url }}" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                                Download
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p>No videos have been downloaded yet.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
