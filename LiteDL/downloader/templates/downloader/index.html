<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Téléchargeur de vidéos</title>
    <style>
        :root {
            --primary-blue: #1a5f7a;
            --secondary-blue: #57c5e0;
            --primary-red: #b22222;
            --secondary-red: #ff6347;
            --light-gray: #f0f0f0;
            --dark-gray: #333333;
        }

        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: var(--dark-gray);
            background-color: var(--light-gray);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: var(--primary-blue);
            text-align: center;
            margin-bottom: 30px;
        }

        #url-form {
            display: flex;
            margin-bottom: 20px;
        }

        #url-input {
            flex-grow: 1;
            padding: 10px;
            border: 2px solid var(--secondary-blue);
            border-radius: 4px 0 0 4px;
            font-size: 16px;
        }

        #info-btn {
            padding: 10px 20px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        #info-btn:hover {
            background-color: var(--secondary-blue);
        }

        #preview {
            background-color: white;
            border: 2px solid var(--secondary-blue);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        #video-title {
            color: var(--primary-blue);
            margin-top: 0;
        }

        #thumbnail {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        #format-select {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid var(--secondary-blue);
            border-radius: 4px;
            font-size: 16px;
        }

        #download-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: var(--primary-red);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        #download-btn:hover {
            background-color: var(--secondary-red);
        }

        #result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            background-color: var(--light-gray);
            color: var(--primary-red);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Téléchargeur de vidéos</h1>
        <p>Entrez l'URL de la vidéo YouTube, Facebook ou TikTok que vous souhaitez télécharger :</p>
        <form id="url-form">
            {% csrf_token %}
            <input type="text" id="url-input" name="url" placeholder="Collez l'URL ici" required>
            <button type="submit" id="info-btn">Obtenir les informations</button>
        </form>
        <div id="preview">
            <h2 id="video-title"></h2>
            <img id="thumbnail" src="" alt="Miniature de la vidéo">
            <select id="format-select"></select>
            <button id="download-btn">Télécharger</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        // Le code JavaScript reste inchangé
        document.getElementById('url-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const url = document.getElementById('url-input').value;
            fetch('/get_video_info/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: 'url=' + encodeURIComponent(url)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    document.getElementById('result').innerHTML = data.error;
                    return;
                }
                document.getElementById('video-title').textContent = data.title;
                document.getElementById('thumbnail').src = data.thumbnail;
                const select = document.getElementById('format-select');
                select.innerHTML = '';
                data.formats.forEach(format => {
                    const option = document.createElement('option');
                    option.value = format.format_id;
                    option.textContent = `${format.resolution} - ${format.ext} (${format.filesize} bytes)`;
                    select.appendChild(option);
                });
                document.getElementById('preview').style.display = 'block';
            });
        });

        document.getElementById('download-btn').addEventListener('click', function() {
            const url = document.getElementById('url-input').value;
            const formatId = document.getElementById('format-select').value;
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/download/';
            const csrfInput = document.createElement('input');
            csrfInput.type = 'hidden';
            csrfInput.name = 'csrfmiddlewaretoken';
            csrfInput.value = '{{ csrf_token }}';
            form.appendChild(csrfInput);
            const urlInput = document.createElement('input');
            urlInput.type = 'hidden';
            urlInput.name = 'url';
            urlInput.value = url;
            form.appendChild(urlInput);
            const formatInput = document.createElement('input');
            formatInput.type = 'hidden';
            formatInput.name = 'format_id';
            formatInput.value = formatId;
            form.appendChild(formatInput);
            document.body.appendChild(form);
            form.submit();
        });
    </script>
</body>
</html>
